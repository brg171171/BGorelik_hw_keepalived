vrrp_script check_web {
    script "/etc/keepalived/check_web.sh"
    interval 3
    fall 2
    rise 1
    weight -30
}

vrrp_instance VI_1 {
    state MASTER
    interface enp0s8
    virtual_router_id 200
    priority 110
    advert_int 1

    virtual_ipaddress {
        192.168.56.200/24
    }

    track_script {
        check_web
    }
}